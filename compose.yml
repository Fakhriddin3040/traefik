services:
  traefik:
    image: traefik:latest
    container_name: traefik

    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"

    expose:
      - "8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik.yml:/traefik.yml:ro
    restart: unless-stopped

    command:
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http3"

networks:
  default:
    name: traefik
    external: true
